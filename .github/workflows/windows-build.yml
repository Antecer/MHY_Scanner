name: Windows Build

on:
  push:
    branches: [ "main" ]
    tags: ["v*"]
  workflow_dispatch:
env:
  BUILD_CONFIGURATION: Release
  VCPKG_DEFAULT_TRIPLET: x64-windows
  INSTALL_DIR: ${{ github.workspace }}\install
  APP_INSTALL_DIR: ${{ github.workspace }}\install\MHY_Scanner
  ZIP_NAME: MHY_Scanner_${{ github.ref_name }}.zip
  VCPKG_BINARY_SOURCES: clear;x-gha,readwrite

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: windows-latest
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Cache FFmpeg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\.cache\ffmpeg
          key: ffmpeg-${{ runner.os }}-btbn-latest-win64-gpl-shared

      - name: Export GitHub Actions cache variables for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.6

      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}\vcpkg_installed
            ${{ env.VCPKG_ROOT }}\downloads
          key: vcpkg-tree-${{ runner.os }}-${{ env.VCPKG_DEFAULT_TRIPLET }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-tree-${{ runner.os }}-${{ env.VCPKG_DEFAULT_TRIPLET }}-

      - name: Install vcpkg dependencies
        run: |
          vcpkg install --triplet ${{ env.VCPKG_DEFAULT_TRIPLET }} --x-install-root=${{ github.workspace }}\vcpkg_installed

      - name: Configure CMake
        run: |
          cmake -S . -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_CONFIGURATION }} `
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}\scripts\buildsystems\vcpkg.cmake `
          -DVCPKG_TARGET_TRIPLET=${{ env.VCPKG_DEFAULT_TRIPLET }} `
          -DVCPKG_INSTALLED_DIR=${{ github.workspace }}\vcpkg_installed `
          -DVCPKG_MANIFEST_INSTALL=OFF `
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}\install `
          -DInstall_Directory=${{ env.APP_INSTALL_DIR }} `
          -DUNIT_TESTS=OFF `
          -DDEV=OFF

      - name: Build
        run: |
          cmake --build build --config ${{ env.BUILD_CONFIGURATION }} --parallel

      - name: Install
        run: |
          cmake --install build --config ${{ env.BUILD_CONFIGURATION }}

      - name: Copy vcpkg runtime DLLs
        run: |
          $source = "${{ github.workspace }}\vcpkg_installed\${{ env.VCPKG_DEFAULT_TRIPLET }}\bin"
          $target = "${{ env.APP_INSTALL_DIR }}"
          if (Test-Path $source) {
            Copy-Item "$source\*.dll" -Destination $target -Force
          }

      - name: Create ZIP
        run: |
          powershell Compress-Archive -Path "${{ env.INSTALL_DIR }}\*" -DestinationPath "${{ github.workspace }}\${{ env.ZIP_NAME }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ github.workspace }}\${{ env.ZIP_NAME }}
          retention-days: 5

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: ${{ github.workspace }}\${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
